name: Production Rate Update
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

# Opt into Node 24 now to clear the warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      # Updated to v5+ to support Node 24
      - uses: actions/checkout@v5 
      
      # Updated to v6+ to support Node 24
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11' # Using a more current Python version for 2026
          
      - name: Install Dependencies
        run: pip install requests beautifulsoup4
        
      - name: Run Scraper
        # This command finds the file wherever it is and runs it
        run: |
          SCRIPT_PATH=$(find . -name "scraper.py" | head -n 1)
          if [ -z "$SCRIPT_PATH" ]; then
            echo "Error: scraper.py not found in the repository!"
            exit 1
          fi
          python "$SCRIPT_PATH"
        
      - name: Commit and Push
        run: |
          git config --global user.name "BankRate-Bot"
          git config --global user.email "55024116+rar245@users.noreply.github.com"
          git add data/rates.json
          git commit -m "Live Update: $(date +'%Y-%m-%d')" || exit 0
          git push
