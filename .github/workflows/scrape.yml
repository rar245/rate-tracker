name: Daily Rate Scraper
on:
  schedule:
    - cron: '*/5 * * * *' # Runs daily at 8 AM UTC (4 AM EST)
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Scraper Requirements
        run: pip install requests beautifulsoup4

      - name: Run Scraper
        run: python scripts/scraper.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "BankRateBot"
          git config --global user.email "bot@yourdomain.com"
          git add data/rates.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update rates for $(date)"
          git push
