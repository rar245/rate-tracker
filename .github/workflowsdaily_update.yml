name: Production Rate Update
on:
  schedule:
    - cron: '0 5 * * *' # 1:00 AM EST every day
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Dependencies
        run: pip install requests beautifulsoup4
      - name: Run Scraper
        run: python scripts/scraper.py
      - name: Commit and Push
        run: |
          git config --global user.name "BankRate-Bot"
          git config --global user.email "bot@bankrate.com"
          git add data/rates.json
          git commit -m "Live Update: $(date +'%Y-%m-%d')" || exit 0
          git push
