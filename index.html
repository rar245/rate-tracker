<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Tracker | Clean Layout</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f1f5f9; --card: #ffffff; --primary: #2563eb; --text: #0f172a; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 24px; }
        .dashboard-container { max-width: 1400px; margin: 0 auto; }
        .kpi-card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 32px; }
        .chart-card { background: var(--card); padding: 24px; border-radius: 20px; border: 1px solid #e2e8f0; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        #mainChart { width: 100%; height: 700px; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <header style="margin-bottom: 32px;">
        <h1 style="margin:0; font-size: 28px;">Market Rate Intelligence</h1>
        <p style="color:#64748b; margin:4px 0;">Clean View Layout</p>
    </header>

    <div class="summary-grid" id="kpiGrid"></div>

    <div class="chart-card">
        <div id="mainChart"></div>
    </div>
</div>

<script>
    async function initDashboard() {
        try {
            const response = await fetch('./data/rates.json');
            const data = await response.json();
            renderKPIs(data);
            renderChart(data);
        } catch (err) { console.error(err); }
    }

    function renderKPIs(data) {
        const last = data[data.length - 1];
        const banks = Object.keys(last).filter(k => k !== 'date');
        let leader = { name: '', rate: 0 };
        banks.forEach(b => { if (last[b] > leader.rate) leader = { name: b, rate: last[b] }; });

        document.getElementById('kpiGrid').innerHTML = `
            <div class="kpi-card"><div>MARKET LEADER</div><div style="font-size:32px; font-weight:700; color:var(--primary)">${leader.rate.toFixed(2)}%</div><div style="font-size:12px; color:#10b981">${leader.name}</div></div>
            <div class="kpi-card"><div>TRACKED</div><div style="font-size:32px; font-weight:700; color:var(--primary)">${banks.length}</div><div style="font-size:12px">Institutions</div></div>
            <div class="kpi-card"><div>LATEST DATA</div><div style="font-size:24px; font-weight:700; color:var(--primary); padding:6px 0;">${last.date}</div><div style="font-size:12px">Verified Snapshot</div></div>
        `;
    }

    function renderChart(data) {
        const chartDom = document.getElementById('mainChart');
        const myChart = echarts.init(chartDom);
        const banks = Object.keys(data[0]).filter(k => k !== 'date');

        const option = {
            color: ['#2563eb', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#f43f5e', '#14b8a6', '#6366f1'],
            tooltip: { trigger: 'axis', order: 'seriesDesc' },
            legend: {
                type: 'scroll', // Handles large amounts of banks elegantly
                top: 0,         // MOVED TO TOP
                right: 20,      // MOVED TO RIGHT
                orient: 'horizontal',
                width: '60%',   // Limits legend width so it doesn't crowd title
                icon: 'circle'
            },
            grid: { 
                top: 80, 
                left: 50, 
                right: 50, 
                bottom: 80, // Reduced bottom since legend is now at the top
                containLabel: true 
            },
            dataZoom: [{ 
                type: 'slider', 
                start: 85, 
                end: 100, 
                bottom: 20, // Now has plenty of room at the absolute bottom
                height: 30 
            }],
            xAxis: { type: 'time' },
            yAxis: { type: 'value', min: 'dataMin', axisLabel: { formatter: '{value}%' } },
            series: banks.map(bank => ({
                name: bank.replace(/_/g, ' '),
                type: 'line',
                step: 'end',
                symbol: 'none',
                connectNulls: true,
                lineStyle: { width: 3 },
                emphasis: { focus: 'series', lineStyle: { width: 5 } },
                data: data.map(d => [d.date, d[bank]])
            }))
        };

        myChart.setOption(option);
        window.addEventListener('resize', myChart.resize);
    }

    initDashboard();
</script>
</body>
</html>
