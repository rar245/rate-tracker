<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Tracker Pro | High-Precision Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #38bdf8;
            --accent: #10b981;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        aside {
            width: 280px;
            min-width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .sidebar-header { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .sidebar-header h2 { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin: 0; }

        .bank-list { overflow-y: auto; flex-grow: 1; margin-top: 10px; }

        .bank-item {
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            font-size: 13px;
            color: var(--text-muted);
            border: 1px solid transparent;
        }

        .bank-item:hover { background: #334155; color: var(--text); }
        .bank-item.active { background: rgba(56, 189, 248, 0.1); border-color: var(--primary); color: var(--text); font-weight: 600; }

        .color-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 12px; opacity: 0.2; }
        .active .color-dot { opacity: 1; border: 1px solid rgba(255,255,255,0.5); }

        main { flex-grow: 1; display: flex; flex-direction: column; padding: 24px; overflow: hidden; }

        .kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 24px; }
        .stat-card { background: var(--surface); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .stat-label { color: var(--text-muted); font-size: 12px; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 700; color: var(--accent); }
        .stat-meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

        .chart-box { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); padding: 20px; flex-grow: 1; position: relative; }
        
        .controls { display: flex; gap: 8px; margin-top: 10px; }
        .btn-action { flex: 1; padding: 6px; font-size: 10px; font-weight: 700; background: #334155; color: var(--text); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; }

        #mainChart { width: 100%; height: 100%; }
    </style>
</head>
<body>

<aside>
    <div class="sidebar-header">
        <h2>Institutions</h2>
        <div class="controls">
            <button class="btn-action" onclick="toggleAll(true)">SELECT ALL</button>
            <button class="btn-action" onclick="toggleAll(false)">CLEAR ALL</button>
        </div>
    </div>
    <div class="bank-list" id="bankList"></div>
</aside>

<main>
    <div class="kpi-row" id="kpiRow"></div>
    <div class="chart-box">
        <div id="mainChart"></div>
    </div>
</main>

    let masterData = null;
    let selectedBanks = new Set();
