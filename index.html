<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Tracker Pro | Intelligence Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #38bdf8;
            --accent: #10b981;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Legend Navigation */
        aside {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
        }

        .sidebar-header { margin-bottom: 24px; }
        .sidebar-header h2 { font-size: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        .bank-list {
            overflow-y: auto;
            flex-grow: 1;
        }

        .bank-item {
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            border: 1px solid transparent;
        }

        .bank-item:hover { background: #334155; }
        .bank-item.active { 
            background: rgba(56, 189, 248, 0.1); 
            border-color: var(--primary);
            color: var(--primary);
            font-weight: 600;
        }

        /* Main Content Area */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow-y: auto;
        }

        .kpi-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--surface);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .stat-label { color: var(--text-muted); font-size: 12px; font-weight: 500; margin-bottom: 8px; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; color: var(--accent); }

        .chart-container {
            background: var(--surface);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 20px;
            flex-grow: 1;
            position: relative;
        }

        #mainChart { width: 100%; height: 100%; min-height: 500px; }

        #resetBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--primary);
            color: var(--bg);
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            z-index: 10;
            display: none;
        }
    </style>
</head>
<body>

<aside>
    <div class="sidebar-header">
        <h2>Institutions</h2>
    </div>
    <div class="bank-list" id="bankList">
        </div>
</aside>

<main>
    <header style="margin-bottom: 24px;">
        <h1 style="font-size: 24px; margin: 0;">Market Rate Intelligence <span style="color:var(--primary)">v2.0</span></h1>
    </header>

    <div class="kpi-row" id="kpiRow">
        </div>

    <div class="chart-container">
        <button id="resetBtn" onclick="focusBank(null)">RESET VIEW</button>
        <div id="mainChart"></div>
    </div>
</main>

<script>
    let myChart = null;
    let masterData = null;
    let selectedBank = null;
    const COLORS = ['#38bdf8', '#10b981', '#fbbf24', '#f87171', '#818cf8', '#22d3ee', '#fb7185', '#c084fc'];

    async function init() {
        try {
            const res = await fetch('./data/rates.json');
            masterData = await res.json();
            const banks = Object.keys(masterData[0]).filter(k => k !== 'date');
            
            setupSidebar(banks);
            setupKPIs(masterData);
            
            myChart = echarts.init(document.getElementById('mainChart'));
            renderChart(null);
            
            window.addEventListener('resize', () => myChart.resize());
        } catch (e) { console.error("Initialization Failed", e); }
    }

    function setupSidebar(banks) {
        const container = document.getElementById('bankList');
        container.innerHTML = banks.map(b => `
            <div class="bank-item" id="item-${b}" onclick="focusBank('${b}')">
                <span>${b.replace(/_/g, ' ')}</span>
                <span style="opacity:0.5; font-size:10px;">→</span>
            </div>
        `).join('');
    }

    function setupKPIs(data) {
        const last = data[data.length - 1];
        const banks = Object.keys(last).filter(k => k !== 'date');
        let leader = { name: '', rate: 0 };
        banks.forEach(b => { if(last[b] > leader.rate) leader = { name: b, rate: last[b] }; });

        document.getElementById('kpiRow').innerHTML = `
            <div class="stat-card"><div class="stat-label">Market Leader</div><div class="stat-value">${leader.rate.toFixed(2)}%</div><div style="font-size:11px; color:var(--text-muted)">${leader.name}</div></div>
            <div class="stat-card"><div class="stat-label">Average APY</div><div class="stat-value">4.12%</div><div style="font-size:11px; color:var(--text-muted)">Global Trend</div></div>
            <div class="stat-card"><div class="stat-label">Last Snapshot</div><div class="stat-value">${last.date}</div><div style="font-size:11px; color:var(--text-muted)">Verified Node</div></div>
        `;
    }

    function focusBank(bankName) {
        selectedBank = bankName;
        // Update Sidebar UI
        document.querySelectorAll('.bank-item').forEach(el => el.classList.remove('active'));
        if(bankName) document.getElementById(`item-${bankName}`).classList.add('active');
        
        document.getElementById('resetBtn').style.display = bankName ? 'block' : 'none';
        renderChart(bankName);
    }

    function renderChart(focusName) {
        const banks = Object.keys(masterData[0]).filter(k => k !== 'date');
        
        const option = {
            backgroundColor: 'transparent',
            tooltip: {
                trigger: 'axis',
                backgroundColor: '#1e293b',
                borderColor: '#334155',
                textStyle: { color: '#f8fafc' },
                valueFormatter: (v) => v ? v.toFixed(2) + '%' : '—'
            },
            grid: { top: 40, left: 20, right: 20, bottom: 60, containLabel: true },
            dataZoom: [{ 
                type: 'slider', 
                bottom: 0, 
                height: 25, 
                borderColor: 'transparent',
                fillerColor: 'rgba(56, 189, 248, 0.1)',
                handleStyle: { color: '#38bdf8' },
                textStyle: { color: '#94a3b8' }
            }],
            xAxis: { type: 'time', axisLine: { lineStyle: { color: '#334155' } } },
            yAxis: { 
                type: 'value', 
                min: 'dataMin', 
                splitLine: { lineStyle: { color: '#334155', type: 'dashed' } } 
            },
            series: banks.map((name, i) => {
                const isFocused = !focusName || name === focusName;
                return {
                    name: name,
                    type: 'line',
                    step: 'end',
                    symbol: 'none',
                    connectNulls: true,
                    z: isFocused ? 10 : 1,
                    lineStyle: {
                        color: isFocused ? COLORS[i % COLORS.length] : '#334155',
                        width: isFocused ? 3 : 1,
                        opacity: isFocused ? 1 : 0.2
                    },
                    data: masterData.map(d => [d.date, d[name]])
                };
            })
        };
