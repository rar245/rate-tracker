<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Tracker | Interactive Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f1f5f9; --card: #ffffff; --primary: #2563eb; --text: #0f172a; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .dashboard-container { max-width: 1400px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .chart-card { background: var(--card); padding: 24px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); position: relative; }
        #resetBtn { display: none; padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; }
        #mainChart { width: 100%; height: 600px; min-height: 400px; }
        #debugInfo { background: #fee2e2; color: #b91c1c; padding: 10px; border-radius: 8px; margin-bottom: 20px; display: none; font-size: 12px; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div id="debugInfo"></div>
    <header>
        <div>
            <h1 style="margin:0; letter-spacing: -1px;">Rate Tracker Intelligence</h1>
            <p style="color:#64748b; margin:4px 0">Click any line to lock focus. Click Reset to show all.</p>
        </div>
        <button id="resetBtn" onclick="renderChart(null)">Reset View</button>
    </header>

    <div class="chart-card">
        <div id="mainChart"></div>
    </div>
</div>

<script>
    let myChart = null;
    let rawData = null;
    let bankNames = [];
    const MASTER_COLORS = ['#2563eb', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#f43f5e', '#14b8a6'];

    async function init() {
        const debug = document.getElementById('debugInfo');
        try {
            // Try to load the real file
            const response = await fetch('./data/rates.json');
            if (!response.ok) throw new Error("Could not find rates.json in /data/ folder.");
            rawData = await response.json();
            
            startChart();
        } catch (e) {
            console.error("Fetch failed, using fallback sample data:", e);
            debug.style.display = 'block';
            debug.innerHTML = `<strong>Error:</strong> ${e.message} <br> Ensure you are running <code>npx serve .</code> and that <code>/data/rates.json</code> exists. Showing sample data below:`;
            
            // FALLBACK DATA (so the site "works" even if the file is missing)
            rawData = [
                {"date": "2026-04-01", "Ally": 4.25, "Barclays": 4.35, "Marcus": 4.40},
                {"date": "2026-04-15", "Ally": 4.30, "Barclays": 4.35, "Marcus": 4.50},
                {"date": "2026-04-26", "Ally": 4.30, "Barclays": 4.40, "Marcus": 4.50}
            ];
            startChart();
        }
    }

    function startChart() {
        bankNames = Object.keys(rawData[0]).filter(k => k !== 'date');
        const chartDom = document.getElementById('mainChart');
        myChart = echarts.init(chartDom);
        
        renderChart(null);

        // Capture clicks on the chart
        myChart.on('click', (params) => {
            if (params.componentType === 'series') {
                renderChart(params.seriesName);
            }
        });

        window.addEventListener('resize', () => myChart.resize());
    }

    function renderChart(focusBank) {
        document.getElementById('resetBtn').style.display = focusBank ? 'block' : 'none';

        const option = {
            animationDuration: 300,
            tooltip: {
                trigger: 'axis',
                order: 'seriesDesc',
                backgroundColor: 'rgba(255, 255, 255, 0.9)',
                valueFormatter: (v) => v ? v.toFixed(2) + '%' : '—'
            },
            legend: {
                bottom: 10,
                selectedMode: true, // Standard legend behavior
                icon: 'circle'
            },
            grid: { top: 40, bottom: 80, left: 50, right: 50, containLabel: true },
            dataZoom: [{ type: 'slider', bottom: 40, height: 20, start: 0, end: 100 }],
            xAxis: { type: 'time' },
            yAxis: { 
                type: 'value', 
                min: 'dataMin', 
                axisLabel: { formatter: '{value}%' },
                splitLine: { lineStyle: { type: 'dashed' } }
            },
            series: bankNames.map((name, index) => {
                const isFocused = !focusBank || name === focusBank;
                const baseColor = MASTER_COLORS[index % MASTER_COLORS.length];

                return {
                    name: name,
                    type: 'line',
                    step: 'end',
                    symbol: 'none',
                    connectNulls: true,
                    z: isFocused ? 10 : 1,
                    lineStyle: {
                        color: isFocused ? baseColor : '#e2e8f0',
                        width: isFocused ? 4 : 1,
                        opacity: isFocused ? 1 : 0.2
                    },
                    emphasis: {
                        lineStyle: { width: 5 }
                    },
                    data: rawData.map(d => [d.date, d[name]])
                };
            })
        };

        myChart.setOption(option, true); // true = NotMerge (Force Redraw)
    }

    init();
</script>

</body>
</html>
