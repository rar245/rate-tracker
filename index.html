<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Tracker | Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f1f5f9;
            --card: #ffffff;
            --primary: #2563eb;
            --text-dark: #0f172a;
            --text-light: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            margin: 0;
            padding: 24px;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 32px;
        }

        h1 { margin: 0; font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
        p.subtitle { color: var(--text-light); margin: 4px 0 0; }

        /* KPI Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .kpi-card {
            background: var(--card);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        .kpi-label { color: var(--text-light); font-size: 13px; font-weight: 500; text-transform: uppercase; }
        .kpi-value { font-size: 32px; font-weight: 700; color: var(--primary); margin: 8px 0; }
        .kpi-sub { font-size: 12px; color: #10b981; font-weight: 600; }

        /* Main Chart Card */
        .chart-card {
            background: var(--card);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }

        #mainChart {
            width: 100%;
            height: 600px;
        }

        #errorOverlay {
            display: none;
            background: #fef2f2;
            color: #991b1b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div id="errorOverlay">
        <strong>Security Block:</strong> Browsers require a local server to read JSON files. 
        Run <code>npx serve .</code> in your terminal.
    </div>

    <header>
        <h1>Market Rate Intelligence</h1>
        <p class="subtitle">High-Yield Savings Performance Analysis</p>
    </header>

    <div class="summary-grid" id="kpiGrid">
        </div>

    <div class="chart-card">
        <div id="mainChart"></div>
    </div>
</div>

<script>
    async function initDashboard() {
        try {
            const response = await fetch('./data/rates.json');
            if (!response.ok) throw new Error('CORS or File Not Found');
            const data = await response.json();

            renderKPIs(data);
            renderChart(data);
        } catch (err) {
            document.getElementById('errorOverlay').style.display = 'block';
            console.error(err);
        }
    }

    function renderKPIs(data) {
        const lastEntry = data[data.length - 1];
        const banks = Object.keys(lastEntry).filter(k => k !== 'date');
        
        // Find current market leader
        let leader = { name: '', rate: 0 };
        banks.forEach(bank => {
            if (lastEntry[bank] > leader.rate) {
                leader = { name: bank, rate: lastEntry[bank] };
            }
        });

        const kpiGrid = document.getElementById('kpiGrid');
        kpiGrid.innerHTML = `
            <div class="kpi-card">
                <div class="kpi-label">Market Leader</div>
                <div class="kpi-value">${leader.rate.toFixed(2)}%</div>
                <div class="kpi-sub">${leader.name.replace(/_/g, ' ')}</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Institutions Tracked</div>
                <div class="kpi-value">${banks.length}</div>
                <div class="kpi-sub">Active Data Streams</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Last Updated</div>
                <div class="kpi-value" style="font-size: 24px; padding: 6px 0;">${lastEntry.date}</div>
                <div class="kpi-sub">Verified Snapshot</div>
            </div>
        `;
    }

    function renderChart(data) {
        const chartDom = document.getElementById('mainChart');
        const myChart = echarts.init(chartDom);
        const banks = Object.keys(data[0]).filter(k => k !== 'date');

        const option = {
            color: ['#2563eb', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#f43f5e', '#14b8a6'],
            tooltip: {
                trigger: 'axis',
                backgroundColor: '#fff',
                borderRadius: 12,
                padding: 12,
                shadowBlur: 10,
                shadowColor: 'rgba(0,0,0,0.1)',
                order: 'seriesDesc',
                textStyle: { fontFamily: 'Inter', fontSize: 13 }
            },
            legend: {
                bottom: 10,
                icon: 'circle',
                itemGap: 20
            },
            grid: { top: 40, left: 40, right: 40, bottom: 100, containLabel: true },
            dataZoom: [{ type: 'slider', start: 80, end: 100, bottom: 50, height: 24 }],
            xAxis: { 
                type: 'time', 
                axisLine: { lineStyle: { color: '#e2e8f0' } },
                axisLabel: { color: '#64748b' }
            },
            yAxis: { 
                type: 'value', 
                min: 'dataMin',
                axisLabel: { formatter: '{value}%', color: '#64748b' },
                splitLine: { lineStyle: { type: 'dashed', color: '#f1f5f9' } }
            },
            series: banks.map(bank => ({
                name: bank.replace(/_/g, ' '),
                type: 'line',
                step: 'end',
                symbol: 'none',
                connectNulls: true,
                lineStyle: { width: 3 },
                emphasis: { focus: 'series', lineStyle: { width: 5 } },
                data: data.map(d => [d.date, d[bank]])
            }))
        };

        myChart.setOption(option);
        window.addEventListener('resize', myChart.resize);
    }

    initDashboard();
</script>

</body>
</html>
