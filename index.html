<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rate Tracker | Theme-Sync Build</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        /* THEME VARIABLES */
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --primary: #2563eb;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --chart-grid: #f1f5f9;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #38bdf8;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --chart-grid: #334155;
        }

        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); transition: background-color 0.3s; }
        .app-container { display: flex; height: 100vh; width: 100vw; }
        
        aside { width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: background-color 0.3s; }
        .bank-list { overflow-y: auto; flex: 1; padding: 15px; }
        .bank-item { padding: 8px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; font-size: 12px; margin-bottom: 4px; border: 1px solid transparent; }
        .bank-item.active { background: rgba(56, 189, 248, 0.1); border-color: var(--primary); font-weight: 600; color: var(--primary); }
        .color-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; opacity: 0.2; }
        .active .color-dot { opacity: 1; }

        main { flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        .top-section { padding: 20px; flex-shrink: 0; }
        .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 15px; }
        .kpi-card { background: var(--surface); padding: 12px; border-radius: 10px; border: 1px solid var(--border); }
        .kpi-val { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; color: #10b981; }

        .chart-section { flex: 1; margin: 0 20px 20px 20px; background: var(--surface); border-radius: 12px; border: 1px solid var(--border); position: relative; min-height: 0; }
        #mainChart { height: 100%; width: 100%; }

        /* THEME TOGGLE BUTTON */
        .theme-toggle {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body data-theme="dark">

<div class="app-container">
    <aside>
        <div style="padding: 20px; border-bottom: 1px solid var(--border);">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2 style="font-size: 10px; text-transform: uppercase; color: var(--text-muted); margin:0;">Institutions</h2>
                <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 DARK</button>
            </div>
            <div style="display:flex; gap:5px;">
                <button onclick="toggleAll(true)" style="flex:1; font-size:9px; padding:5px; cursor:pointer;">ALL</button>
                <button onclick="toggleAll(false)" style="flex:1; font-size:9px; padding:5px; cursor:pointer;">NONE</button>
            </div>
        </div>
        <div class="bank-list" id="bankList"></div>
    </aside>

    <main>
        <div class="top-section">
            <h1 style="margin:0; font-size: 20px;">Rate Intelligence <span style="opacity:0.5;">v2.0</span></h1>
            <div class="kpi-grid" id="kpiRow"></div>
        </div>
        <div class="chart-section">
            <div id="mainChart"></div>
        </div>
    </main>
</div>

<script>
    const COLORS = ['#38bdf8', '#10b981', '#fbbf24', '#f87171', '#818cf8', '#22d3ee', '#fb7185', '#c084fc', '#6366f1'];
    const DATA_URL = 'https://raw.githubusercontent.com/rar245/rate-tracker/main/data/rates.json';
    
    let myChart, masterData, selectedBanks = new Set();

    // --- THEME ENGINE ---
    function toggleTheme() {
        const body = document.body;
        const currentTheme = body.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        
        body.setAttribute('data-theme', newTheme);
        document.getElementById('themeBtn').innerHTML = newTheme === 'dark' ? '🌙 DARK' : '☀️ LIGHT';
        localStorage.setItem('rate-tracker-theme', newTheme);
        
        if (myChart) renderChart(Object.keys(masterData[0]).filter(k => k !== 'date'));
    }

    // Load saved theme
    const savedTheme = localStorage.getItem('rate-tracker-theme') || 'dark';
    document.body.setAttribute('data-theme', savedTheme);
    document.getElementById('themeBtn').innerHTML = savedTheme === 'dark' ? '🌙 DARK' : '☀️ LIGHT';

    async function init() {
        try {
            const res = await fetch(DATA_URL);
            masterData = await res.json();
            const banks = Object.keys(masterData[0]).filter(k => k !== 'date');
            
            const last = masterData[masterData.length - 1];
            let leader = banks[0];
            banks.forEach(b => { if(last[b] > last[leader]) leader = b; });
            selectedBanks.add(leader);

            myChart = echarts.init(document.getElementById('mainChart'));
            
            myChart.on('click', (params) => {
                if (params.componentType === 'series') toggleBank(params.seriesName);
            });

            update();
            window.addEventListener('resize', () => myChart.resize());
        } catch (e) { console.error("Load Error", e); }
    }

    function update() {
        const banks = Object.keys(masterData[0]).filter(k => k !== 'date');
        renderKPIs();
        renderSidebar(banks);
        renderChart(banks);
    }

    function renderKPIs() {
        const last = masterData[masterData.length - 1];
        const banks = Object.keys(last).filter(k => k !== 'date');
        let leader = { name: '', rate: 0 }, sum = 0, count = 0;
        banks.forEach(b => {
            const r = last[b];
            if (r > leader.rate) leader = { name: b, rate: r };
            if (r > 0) { sum += r; count++; }
        });
        document.getElementById('kpiRow').innerHTML = `
            <div class="kpi-card"><div style="font-size:9px; color:var(--text-muted)">LEADER</div><div class="kpi-val">${leader.rate.toFixed(2)}%</div><div style="font-size:9px">${leader.name}</div></div>
            <div class="kpi-card"><div style="font-size:9px; color:var(--text-muted)">AVG APY</div><div class="kpi-val" style="color:var(--text)">${(sum/count).toFixed(2)}%</div><div style="font-size:9px">Current</div></div>
            <div class="kpi-card"><div style="font-size:9px; color:var(--text-muted)">SNAPSHOT</div><div class="kpi-val" style="font-size:16px; color:var(--primary);">${last.date}</div><div style="font-size:9px">Verified</div></div>`;
    }

    function renderSidebar(banks) {
        document.getElementById('bankList').innerHTML = banks.map((b, i) => `
            <div class="bank-item ${selectedBanks.has(b) ? 'active' : ''}" onclick="toggleBank('${b}')">
                <div class="color-dot" style="background-color: ${COLORS[i % COLORS.length]}"></div>
                <span>${b}</span>
            </div>`).join('');
    }

    function toggleBank(name) {
        selectedBanks.has(name) ? selectedBanks.delete(name) : selectedBanks.add(name);
        update();
    }

    function toggleAll(show) {
        const banks = Object.keys(masterData[0]).filter(k => k !== 'date');
        selectedBanks = show ? new Set(banks) : new Set();
        update();
    }

    function renderChart(banks) {
        const isDark = document.body.getAttribute('data-theme') === 'dark';
        const option = {
            backgroundColor: 'transparent',
            tooltip: {
                trigger: 'axis',
                backgroundColor: isDark ? '#1e293b' : '#ffffff',
                borderColor: isDark ? '#334155' : '#e2e8f0',
                textStyle: { color: isDark ? '#f8fafc' : '#0f172a', fontSize: 11 },
                formatter: (params) => {
                    let res = `<div style="border-bottom:1px solid ${isDark ? '#444' : '#eee'};margin-bottom:5px;padding-bottom:3px"><b>${params[0].axisValueLabel}</b></div>`;
                    params.filter(p => p.value[1] !== null).sort((a,b) => b.value[1] - a.value[1]).forEach(p => {
                        const isSel = selectedBanks.has(p.seriesName);
                        res += `<div style="display:flex;justify-content:space-between;gap:15px; opacity:${isSel ? 1 : 0.3}; padding: 2px 0;">
                                    <span>${p.marker}${p.seriesName}</span>
                                    <b style="color:${isSel ? (isDark ? '#38bdf8' : '#2563eb') : '#94a3b8'}">${p.value[1].toFixed(2)}%</b>
                                </div>`;
                    });
                    return res;
                }
            },
            grid: { top: 30, left: 10, right: 10, bottom: 85, containLabel: true },
            dataZoom: [{ 
                type: 'slider', bottom: 25, height: 35, 
                borderColor: 'transparent', backgroundColor: isDark ? '#0f172a' : '#f1f5f9',
                fillerColor: isDark ? 'rgba(56, 189, 248, 0.1)' : 'rgba(37, 99, 235, 0.1)',
                handleStyle: { color: isDark ? '#38bdf8' : '#2563eb' }, textStyle: { color: isDark ? '#94a3b8' : '#64748b' },
                start: 80, end: 100
            }, { type: 'inside' }],
            xAxis: { type: 'time', axisLine: { lineStyle: { color: isDark ? '#334155' : '#e2e8f0' } }, splitLine: { show: false } },
            yAxis: { type: 'value', min: 'dataMin', axisLabel: { formatter: '{value}%', color: isDark ? '#94a3b8' : '#64748b' }, splitLine: { lineStyle: { color: isDark ? '#334155' : '#f1f5f9', type: 'dashed' } } },
            series: banks.map((name, i) => {
                const sel = selectedBanks.has(name);
                const inactiveColor = isDark ? '#1e293b' : '#e2e8f0';
                return {
                    name, type: 'line', step: 'end', symbol: 'none', connectNulls: true, z: sel ? 100 : 1,
                    lineStyle: { color: sel ? COLORS[i % COLORS.length] : inactiveColor, width: sel ? 3.5 : 1.5, opacity: sel ? 1 : 0.1 },
                    data: masterData.map(d => [d.date, d[name]])
                };
            })
        };
        myChart.setOption(option, true);
    }

    init();
</script>
</body>
</html>
