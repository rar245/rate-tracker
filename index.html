<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Tracker Pro | High-Precision Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #38bdf8;
            --accent: #10b981;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        aside {
            width: 280px;
            min-width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .sidebar-header { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .sidebar-header h2 { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin: 0; }

        .bank-list { overflow-y: auto; flex-grow: 1; margin-top: 10px; }

        .bank-item {
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            font-size: 13px;
            color: var(--text-muted);
            border: 1px solid transparent;
        }

        .bank-item:hover { background: #334155; color: var(--text); }
        .bank-item.active { background: rgba(56, 189, 248, 0.1); border-color: var(--primary); color: var(--text); font-weight: 600; }

        .color-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 12px; opacity: 0.2; }
        .active .color-dot { opacity: 1; border: 1px solid rgba(255,255,255,0.5); }

        main { flex-grow: 1; display: flex; flex-direction: column; padding: 24px; overflow: hidden; }

        .kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 24px; }
        .stat-card { background: var(--surface); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .stat-label { color: var(--text-muted); font-size: 12px; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 700; color: var(--accent); }
        .stat-meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

        .chart-box { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); padding: 20px; flex-grow: 1; position: relative; }
        
        .controls { display: flex; gap: 8px; margin-top: 10px; }
        .btn-action { flex: 1; padding: 6px; font-size: 10px; font-weight: 700; background: #334155; color: var(--text); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; }

        #mainChart { width: 100%; height: 100%; }
    </style>
</head>
<body>

<aside>
    <div class="sidebar-header">
        <h2>Institutions</h2>
        <div class="controls">
            <button class="btn-action" onclick="toggleAll(true)">SELECT ALL</button>
            <button class="btn-action" onclick="toggleAll(false)">CLEAR ALL</button>
        </div>
    </div>
    <div class="bank-list" id="bankList"></div>
</aside>

<main>
    <div class="kpi-row" id="kpiRow"></div>
    <div class="chart-box">
        <div id="mainChart"></div>
    </div>
</main>

<script>
    let myChart = null;
    let masterData = null;
    let selectedBanks = new Set();
    const COLORS = ['#38bdf8', '#10b981', '#fbbf24', '#f87171', '#818cf8', '#22d3ee', '#fb7185', '#c084fc', '#6366f1'];

    async function init() {
        try {
            const res = await fetch('./data/rates.json');
            masterData = await res.json();
            const banks = Object.keys(masterData[0]).filter(k => k !== 'date');

            // Default to Market Leader
            const last = masterData[masterData.length - 1];
            let leader = banks[0];
            banks.forEach(b => { if(last[b] > last[leader]) leader = b; });
            selectedBanks.add(leader);

            myChart = echarts.init(document.getElementById('mainChart'));
            updateDashboard(banks);
            window.addEventListener('resize', () => myChart.resize());
        } catch (e) { console.error(e); }
    }

    function updateDashboard(banks) {
        renderKPIs(masterData);
        renderSidebar(banks);
        renderChart(banks);
    }

    function renderKPIs(data) {
        const last = data[data.length - 1];
        const banks = Object.keys(last).filter(k => k !== 'date');
        let leader = { name: '', rate: 0 };
        let sum = 0, count = 0;

        banks.forEach(b => {
            const rate = last[b];
            if (rate > leader.rate) leader = { name: b, rate: rate };
            if (rate > 0) { sum += rate; count++; }
        });

        document.getElementById('kpiRow').innerHTML = `
            <div class="stat-card">
                <div class="stat-label">Market Leader</div>
                <div class="stat-value">${leader.rate.toFixed(2)}%</div>
                <div class="stat-meta">${leader.name}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Average APY</div>
                <div class="stat-value">${(sum / count).toFixed(2)}%</div>
                <div class="stat-meta">Across Network</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Last Snapshot</div>
                <div class="stat-value" style="font-size: 20px;">${last.date}</div>
                <div class="stat-meta">Verified Node</div>
            </div>
        `;
    }

    function renderSidebar(banks) {
        const container = document.getElementById('bankList');
        container.innerHTML = banks.map((b, i) => `
            <div class="bank-item ${selectedBanks.has(b) ? 'active' : ''}" onclick="toggleBank('${b}')">
                <div class="color-dot" style="background-color: ${COLORS[i % COLORS.length]}"></div>
                <span>${b}</span>
            </div>
        `).join('');
    }

    function toggleBank(name) {
        if (selectedBanks.has(name)) selectedBanks.delete(name);
        else selectedBanks.add(name);
        updateDashboard(Object.keys(masterData[0]).filter(k => k !== 'date'));
    }

    function toggleAll(showAll) {
        const banks = Object.keys(masterData[0]).filter(k => k !== 'date');
        selectedBanks = showAll ? new Set(banks) : new Set();
        updateDashboard(banks);
    }

    function renderChart(banks) {
        const option = {
            backgroundColor: 'transparent',
            tooltip: {
                trigger: 'axis',
                backgroundColor: 'rgba(30, 41, 59, 0.95)',
                borderColor: '#334155',
                borderWidth: 1,
                textStyle: { color: '#f8fafc', fontSize: 12 },
                // --- CUSTOM FORMATTER TO HIDE NULLS ---
                formatter: function (params) {
                    let result = `<div style="font-weight:bold; margin-bottom:5px; border-bottom: 1px solid #444;">${params[0].axisValueLabel}</div>`;
                    let hasData = false;
                    params.forEach(item => {
                        // Only show if value is not null and the bank is currently selected/highlighted
                        if (item.value[1] !== null && item.value[1] !== undefined) {
                            hasData = true;
                            result += `
                                <div style="display:flex; justify-content:space-between; gap:20px; margin: 2px 0;">
                                    <span>${item.marker} ${item.seriesName}</span>
                                    <span style="font-family:'JetBrains Mono'; font-weight:bold; color:#38bdf8">${item.value[1].toFixed(2)}%</span>
                                </div>`;
                        }
                    });
                    return hasData ? result : "No data for this date";
                }
            },
            grid: { top: 30, left: 10, right: 20, bottom: 60, containLabel: true },
            dataZoom: [{ 
                type: 'slider', bottom: 0, height: 30, 
                borderColor: 'transparent', backgroundColor: '#0f172a',
                fillerColor: 'rgba(56, 189, 248, 0.1)',
                handleStyle: { color: '#38bdf8' }, textStyle: { color: '#94a3b8' }
            }],
            xAxis: { 
                type: 'time', 
                axisLine: { lineStyle: { color: '#334155' } },
                splitLine: { show: false }
            },
            yAxis: { 
                type: 'value', 
                min: 'dataMin', 
                // --- ADDED % TO NUMERALS ---
                axisLabel: { 
                    formatter: '{value}%',
                    color: '#94a3b8',
                    fontFamily: 'JetBrains Mono'
                },
                splitLine: { lineStyle: { color: '#334155', type: 'dashed' } } 
            },
            series: banks.map((name, i) => {
                const isSelected = selectedBanks.has(name);
                return {
                    name: name,
                    type: 'line',
                    step: 'end',
                    symbol: 'none',
                    connectNulls: true,
                    z: isSelected ? 10 : 1,
                    lineStyle: {
                        color: isSelected ? COLORS[i % COLORS.length] : '#1e293b',
                        width: isSelected ? 3 : 1,
                        opacity: isSelected ? 1 : 0.05
                    },
                    data: masterData.map(d => [d.date, d[name]])
                };
            })
        };
        myChart.setOption(option, true);
    }

    init();
</script>
</body>
</html>
