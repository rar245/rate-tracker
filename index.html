<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Tracker | Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --error-bg: #fef2f2;
            --error-text: #991b1b;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
        }

        header {
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 2px solid var(--border);
            padding-bottom: 20px;
        }

        h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.025em;
            color: var(--text-main);
        }

        .status {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            overflow-x: auto; /* Handles many banks on mobile */
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            text-align: left;
        }

        th {
            background-color: #f8fafc;
            padding: 16px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid #f1f5f9;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background-color: #f1f5f9;
        }

        .rate-value {
            font-weight: 600;
            color: var(--primary);
            font-variant-numeric: tabular-nums; /* Keeps numbers aligned */
        }

        .date-cell {
            color: var(--text-muted);
            white-space: nowrap;
            font-family: monospace;
        }

        #errorMessage {
            display: none;
            padding: 20px;
            background: var(--error-bg);
            color: var(--error-text);
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #fee2e2;
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            body { padding: 20px 10px; }
            header { flex-direction: column; align-items: flex-start; gap: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="errorMessage">
        <strong>Data Load Blocked:</strong> Browsers block local file access for security. <br>
        To fix this, run <code>npx serve .</code> in your terminal and open the link provided.
    </div>

    <header>
        <div>
            <h1>Savings Rate Repository</h1>
            <div class="status">Source: <code>/data/rates.json</code></div>
        </div>
        <div class="status" id="lastUpdated">Syncing master data...</div>
    </header>

    <div class="card">
        <table id="ratesTable">
            <thead>
                <tr id="headerRow"></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    async function loadRates() {
        const errorEl = document.getElementById('errorMessage');
        const updateEl = document.getElementById('lastUpdated');
        
        try {
            // Path adjusted to your shared directory structure
            const response = await fetch('./data/rates.json');
            if (!response.ok) throw new Error('File not found');
            
            const data = await response.json();
            
            // 1. Update Status
            updateEl.textContent = `Last Entry: ${data[data.length - 1].date}`;
            
            // 2. Reverse to show Newest First
            const displayData = [...data].reverse();
            const keys = Object.keys(data[0]);

            // 3. Build Headers
            const headerRow = document.getElementById('headerRow');
            keys.forEach(key => {
                const th = document.createElement('th');
                th.textContent = key.replace(/_/g, ' ');
                headerRow.appendChild(th);
            });

            // 4. Build Rows
            const tbody = document.getElementById('tableBody');
            displayData.forEach(row => {
                const tr = document.createElement('tr');
                keys.forEach(key => {
                    const td = document.createElement('td');
                    if (key === 'date') {
                        td.className = 'date-cell';
                        td.textContent = row[key];
                    } else {
                        td.className = 'rate-value';
                        // Handle null values gracefully
                        td.textContent = (row[key] !== null && row[key] !== undefined) 
                            ? row[key].toFixed(2) + '%' 
                            : '—';
                    }
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });

        } catch (err) {
            console.error("Layout Error:", err);
            errorEl.style.display = 'block';
            updateEl.textContent = "Sync Failed";
        }
    }

    loadRates();
</script>

</body>
</html>
