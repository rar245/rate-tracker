<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rate Tracker | Interactive Series Build</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --surface: #1e293b; --primary: #38bdf8; --text: #f8fafc; --border: #334155; }
        
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
        }

        .app-container { display: flex; height: 100vh; width: 100vw; }

        aside { 
            width: 240px; 
            background: var(--surface); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
        }

        .bank-list { overflow-y: auto; flex: 1; padding: 15px; }
        .bank-item { padding: 8px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; font-size: 12px; margin-bottom: 4px; border: 1px solid transparent; transition: 0.2s; }
        .bank-item:hover { background: rgba(255,255,255,0.05); }
        .bank-item.active { background: rgba(56, 189, 248, 0.1); border-color: var(--primary); font-weight: 600; color: var(--primary); }
        
        .color-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; opacity: 0.2; }
        .active .color-dot { opacity: 1; box-shadow: 0 0 8px currentColor; }

        main { flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        .top-section { padding: 20px; flex-shrink: 0; }
        .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 15px; }
        .kpi-card { background: var(--surface); padding: 12px; border-radius: 10px; border: 1px solid var(--border); }
        .kpi-val { font-family: 'JetBrains Mono', monospace; font-size: 20px; color: #10b981; font-weight: 700; }

        .chart-section { 
            flex: 1; 
            margin: 0 20px 20px 20px; 
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--border);
            position: relative;
            min-height: 0; 
        }

        #mainChart { height: 100%; width: 100%; }
        
        /* Tooltip refinement */
        .tt-row { display: flex; justify-content: space-between; gap: 20px; margin: 2px 0; }
    </style>
</head>
<body>

<div class="app-container">
    <aside>
        <div style="padding: 20px; border-bottom: 1px solid var(--border);">
            <h2 style="font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #94a3b8; margin:0;">Institutions</h2>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <button onclick="toggleAll(true)" style="flex:1; font-size:9px; padding:5px; cursor:pointer; background:#334155; color:white; border:none; border-radius:4px;">ALL</button>
                <button onclick="toggleAll(false)" style="flex:1; font-size:9px; padding:5px; cursor:pointer; background:#334155; color:white; border:none; border-radius:4px;">NONE</button>
            </div>
        </div>
        <div class="bank-list" id="bankList"></div>
    </aside>

    <main>
        <div class="top-section">
            <h1 style="margin:0; font-size: 20px; color: var(--text);">Rate Intelligence <span style="font-weight:400; opacity:0.5;">v2.0</span></h1>
            <div class="kpi-grid" id="kpiRow"></div>
        </div>

        <div class="chart-section">
            <div id="mainChart"></div>
        </div>
    </main>
</div>

<script>
    const COLORS = ['#38bdf8', '#10b981', '#fbbf24', '#f87171', '#818cf8', '#22d3ee', '#fb7185', '#c084fc', '#6366f1'];
    let myChart, masterData, selectedBanks = new Set();

    async function init() {
        try {
            const res = await fetch('./data/rates.json');
            masterData = await res.json();
            const banks = Object.keys(masterData[0]).filter(k => k !== 'date');
            
            const last = masterData[masterData.length - 1];
            let leader = banks[0];
            banks.forEach(b => { if(last[b] > last[leader]) leader = b; });
            selectedBanks.add(leader);

            myChart = echarts.init(document.getElementById('mainChart'));
            
            // --- NEW: INTERACTIVE LINE CLICKS ---
            myChart.on('click', (params) => {
                if (params.componentType === 'series') {
                    toggleBank(params.seriesName);
                }
            });

            update();
            window.addEventListener('resize', () => myChart.resize());
        } catch (e) { console.error("Init fail", e); }
    }

    function update() {
        const banks = Object.keys(masterData[0]).filter(k => k !== 'date');
        renderKPIs();
        renderSidebar(banks);
        renderChart(banks);
    }

    function renderKPIs() {
        const last = masterData[masterData.length - 1];
        const banks = Object.keys(last).filter(k => k !== 'date');
        let leader = { name: '', rate: 0 }, sum = 0, count = 0;
        banks.forEach(b => {
            const r = last[b];
            if (r > leader.rate) leader = { name: b, rate: r };
            if (r > 0) { sum += r; count++; }
        });
        document.getElementById('kpiRow').innerHTML = `
            <div class="kpi-card"><div style="font-size:9px; color:#94a3b8">MARKET LEADER</div><div class="kpi-val">${leader.rate.toFixed(2)}%</div><div style="font-size:9px">${leader.name}</div></div>
            <div class="kpi-card"><div style="font-size:9px; color:#94a3b8">AVERAGE APY</div><div class="kpi-val">${(sum/count).toFixed(2)}%</div><div style="font-size:9px">All Institutions</div></div>
            <div class="kpi-card"><div style="font-size:9px; color:#94a3b8">LATEST SYNC</div><div class="kpi-val" style="font-size:16px; color:#38bdf8">${last.date}</div><div style="font-size:9px">Verified Entry</div></div>`;
    }

    function renderSidebar(banks) {
        document.getElementById('bankList').innerHTML = banks.map((b, i) => `
            <div class="bank-item ${selectedBanks.has(b) ? 'active' : ''}" onclick="toggleBank('${b}')">
                <div class="color-dot" style="background-color: ${COLORS[i % COLORS.length]}; color: ${COLORS[i % COLORS.length]}"></div>
                <span>${b}</span>
            </div>`).join('');
    }

    function toggleBank(name) {
        selectedBanks.has(name) ? selectedBanks.delete(name) : selectedBanks.add(name);
        update();
    }

    function toggleAll(show) {
        selectedBanks = show ? new Set(Object.keys(masterData[0]).filter(k => k !== 'date')) : new Set();
        update();
    }

    function renderChart(banks) {
        const option = {
            tooltip: {
                trigger: 'axis',
                backgroundColor: 'rgba(15, 23, 42, 0.9)',
                borderColor: '#334155',
                borderWidth: 1,
                textStyle: { color: '#f8fafc', fontSize: 11, fontFamily: 'Inter' },
                formatter: (params) => {
                    let res = `<div style="border-bottom:1px solid #334155; padding-bottom:5px; margin-bottom:5px;"><b>${params[0].axisValueLabel}</b></div>`;
                    params.filter(p => p.value[1] !== null).forEach(p => {
                        const isSel = selectedBanks.has(p.seriesName);
                        res += `<div class="tt-row" style="opacity: ${isSel ? 1 : 0.5}">
                                    <span>${p.marker} ${p.seriesName}</span>
                                    <b style="color:${isSel ? '#38bdf8' : '#94a3b8'}">${p.value[1].toFixed(2)}%</b>
                                </div>`;
                    });
                    return res;
                }
            },
            grid: { top: 30, left: 20, right: 20, bottom: 80, containLabel: true },
            dataZoom: [{ 
                type: 'slider', 
                bottom: 20, 
                height: 35, 
                borderColor: 'transparent', 
                backgroundColor: '#0f172a',
                fillerColor: 'rgba(56, 189, 248, 0.1)',
                handleStyle: { color: '#38bdf8' },
                textStyle: { color: '#94a3b8' },
                start: 80, end: 100
            }],
            xAxis: { 
                type: 'time', 
                axisLine: { lineStyle: { color: '#334155' } },
                splitLine: { show: false }
            },
            yAxis: { 
                type: 'value', 
                min: 'dataMin', 
                axisLabel: { formatter: '{value}%', color: '#94a3b8', fontFamily: 'JetBrains Mono' }, 
                splitLine: { lineStyle: { color: '#334155', type: 'dashed' } } 
            },
            series: banks.map((name, i) => {
                const sel = selectedBanks.has(name);
                return {
                    name, 
                    type: 'line', 
                    step: 'end', 
                    symbol: 'circle', // Added symbols back for better click targets
                    symbolSize: 0,
                    emphasis: {
                        scale: true,
                        lineStyle: { width: 5 },
                        itemStyle: { symbolSize: 8 }
                    },
                    connectNulls: true, 
                    z: sel ? 10 : 1,
                    lineStyle: { 
                        color: sel ? COLORS[i % COLORS.length] : '#1e293b', 
                        width: sel ? 3 : 1.5, 
                        opacity: sel ? 1 : 0.1 
                    },
                    data: masterData.map(d => [d.date, d[name]])
                };
            })
        };
        
        // --- NEW: CHANGE CURSOR TO POINTER ON HOVER ---
        myChart.getZr().on('mousemove', (params) => {
            const pointInPixel = [params.offsetX, params.offsetY];
            if (myChart.containPixel('grid', pointInPixel)) {
                myChart.getZr().setCursorStyle('pointer');
            } else {
                myChart.getZr().setCursorStyle('default');
            }
        });

        myChart.setOption(option, true);
    }

    init();
</script>
</body>
</html>
