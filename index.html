<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Tracker Pro | Fixed Layout</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0f172a; 
            --surface: #1e293b; 
            --primary: #38bdf8; 
            --accent: #10b981; 
            --text: #f8fafc; 
            --text-muted: #94a3b8; 
            --border: #334155; 
        }
        
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; /* Hard lock on scrolling */
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
        }
        
        .app-wrapper {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar: Legend */
        aside { 
            width: 240px; 
            min-width: 240px; 
            background: var(--surface); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            padding: 15px;
            box-sizing: border-box;
        }

        .bank-list { overflow-y: auto; flex-grow: 1; padding-right: 5px; }
        .bank-item { padding: 8px; border-radius: 6px; margin-bottom: 4px; cursor: pointer; display: flex; align-items: center; font-size: 12px; color: var(--text-muted); }
        .bank-item.active { background: rgba(56, 189, 248, 0.1); color: var(--text); font-weight: 600; border: 1px solid var(--primary); }
        .color-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; opacity: 0.2; }
        .active .color-dot { opacity: 1; }

        /* Main Workspace */
        main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            padding: 15px; 
            box-sizing: border-box;
            gap: 15px;
        }

        /* Fixed Header Heights */
        .header-section { flex-shrink: 0; }
        .kpi-row { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
            flex-shrink: 0; 
        }

        .stat-card { background: var(--surface); padding: 12px; border-radius: 10px; border: 1px solid var(--border); }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }

        /* CHART CONTAINER: The Magic Fix */
        .chart-box { 
            background: var(--surface); 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            padding: 10px; 
            /* This calculation ensures the chart box fits the viewport perfectly */
            height: calc(100vh - 160px); 
            position: relative;
            box-sizing: border-box;
        }
        
        #mainChart { height: 100%; width: 100%; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <aside>
        <div style="margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">
            <h2 style="font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin: 0;">Institutions</h2>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <button onclick="toggleAll(true)" style="flex:1; font-size:9px; padding:4px; cursor:pointer; background:#334155; color:white; border:none; border-radius:3px;">ALL</button>
                <button onclick="toggleAll(false)" style="flex:1; font-size:9px; padding:4px; cursor:pointer; background:#334155; color:white; border:none; border-radius:3px;">NONE</button>
            </div>
        </div>
        <div class="bank-list" id="bankList"></div>
    </aside>

    <main>
        <div class="header-section">
            <h1 style="font-size: 18px; margin: 0; font-weight: 700;">Rate Intelligence <span style="color:var(--primary); font-weight: 400;">v2.0</span></h1>
        </div>

        <div class="kpi-row" id="kpiRow"></div>

        <div class="chart-box">
            <div id="mainChart"></div>
        </div>
    </main>
</div>

<script>
    const COLORS = ['#38bdf8', '#10b981', '#fbbf24', '#f87171', '#818cf8', '#22d3ee', '#fb7185', '#c084fc', '#6366f1'];
    let myChart, masterData, selectedBanks = new Set();

    async function run() {
        try {
            const res = await fetch('./data/rates.json');
            masterData = await res.json();
            const banks = Object.keys(masterData[0]).filter(k => k !== 'date');
            
            // Auto-select Leader
            const last = masterData[masterData.length - 1];
            let leader = banks[0];
            banks.forEach(b => { if(last[b] > last[leader]) leader = b; });
            selectedBanks.add(leader);

            myChart = echarts.init(document.getElementById('mainChart'));
            updateAll();
            
            window.addEventListener('resize', () => myChart && myChart.resize());
        } catch (e) { console.error(e); }
    }

    function updateAll() {
        const banks = Object.keys(masterData[0]).filter(k => k !== 'date');
        renderKPIs();
        renderSidebar(banks);
        renderChart(banks);
    }

    function renderKPIs() {
        const last = masterData[masterData.length - 1];
        const banks = Object.keys(last).filter(k => k !== 'date');
        let leader = { name: '', rate: 0 }, sum = 0, count = 0;
        banks.forEach(b => {
            const r = last[b];
            if (r > leader.rate) leader = { name: b, rate: r };
            if (r > 0) { sum += r; count++; }
        });
        document.getElementById('kpiRow').innerHTML = `
            <div class="stat-card"><div class="stat-label">Market Leader</div><div class="stat-value">${leader.rate.toFixed(2)}%</div><div style="font-size:9px">${leader.name}</div></div>
            <div class="stat-card"><div class="stat-label">Average APY</div><div class="stat-value">${(sum/count).toFixed(2)}%</div><div style="font-size:9px">Current Mean</div></div>
            <div class="stat-card"><div class="stat-label">Last Snapshot</div><div class="stat-value" style="font-size:16px">${last.date}</div><div style="font-size:9px">Verified</div></div>`;
    }

    function renderSidebar(banks) {
        document.getElementById('bankList').innerHTML = banks.map((b, i) => `
            <div class="bank-item ${selectedBanks.has(b) ? 'active' : ''}" onclick="toggleBank('${b}')">
                <div class="color-dot" style="background-color: ${COLORS[i % COLORS.length]}"></div>
                <span>${b}</span>
            </div>`).join('');
    }

    function toggleBank(name) {
        selectedBanks.has(name) ? selectedBanks.delete(name) : selectedBanks.add(name);
        updateAll();
    }

    function toggleAll(show) {
        selectedBanks = show ? new Set(Object.keys(masterData[0]).filter(k => k !== 'date')) : new Set();
        updateAll();
    }

    function renderChart(banks) {
        const option = {
            backgroundColor: 'transparent',
            tooltip: {
                trigger: 'axis',
                backgroundColor: 'rgba(30, 41, 59, 0.95)',
                borderColor: '#334155',
                textStyle: { color: '#f8fafc', fontSize: 11 },
                formatter: (params) => {
                    let res = `<div style="border-bottom:1px solid #444;margin-bottom:5px"><b>${params[0].axisValueLabel}</b></div>`;
                    params.filter(p => p.value[1] !== null).forEach(p => {
                        res += `<div style="display:flex;justify-content:space-between;gap:15px;"><span>${p.marker}${p.seriesName}</span><b>${p.value[1].toFixed(2)}%</b></div>`;
                    });
                    return res;
                }
            },
            grid: { top: 15, left: 10, right: 10, bottom: 65, containLabel: true },
            dataZoom: [{ 
                type: 'slider', bottom: 10, height: 25, 
                borderColor: 'transparent', backgroundColor: '#0f172a',
                handleStyle: { color: '#38bdf8' }, textStyle: { color: '#94a3b8' },
                start: 80, end: 100
            }],
            xAxis: { type: 'time', axisLine: { lineStyle: { color: '#334155' } } },
            yAxis: { type: 'value', min: 'dataMin', axisLabel: { formatter: '{value}%', color: '#94a3b8', fontSize: 10 }, splitLine: { lineStyle: { color: '#334155', type: 'dashed' } } },
            series: banks.map((name, i) => {
                const sel = selectedBanks.has(name);
                return {
                    name, type: 'line', step: 'end', symbol: 'none', connectNulls: true, z: sel ? 10 : 1,
                    lineStyle: { color: sel ? COLORS[i % COLORS.length] : '#1e293b', width: sel ? 3 : 1, opacity: sel ? 1 : 0.05 },
                    data: masterData.map(d => [d.date, d[name]])
                };
            })
        };
        myChart.setOption(option, true);
    }

    run();
</script>
</body>
</html>
