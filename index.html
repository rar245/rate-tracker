<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Tracker | Interactive Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f1f5f9; --card: #ffffff; --primary: #2563eb; --text: #0f172a; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .dashboard-container { max-width: 1400px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .chart-card { background: var(--card); padding: 24px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        #resetBtn { display: none; padding: 8px 16px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px; }
        #mainChart { width: 100%; height: 600px; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <header>
        <div>
            <h1 style="margin:0">Rate Intelligence</h1>
            <p style="color:#64748b; margin:4px 0">Click any line or legend item to focus</p>
        </div>
        <button id="resetBtn" onclick="resetChart()">Reset View</button>
    </header>

    <div class="chart-card">
        <div id="mainChart"></div>
    </div>
</div>

<script>
    let myChart = null;
    let rawData = null;
    let bankNames = [];
    const MASTER_COLORS = ['#2563eb', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#f43f5e', '#14b8a6'];

    async function init() {
        try {
            const response = await fetch('./data/rates.json');
            rawData = await response.json();
            bankNames = Object.keys(rawData[0]).filter(k => k !== 'date');
            
            const chartDom = document.getElementById('mainChart');
            myChart = echarts.init(chartDom);
            
            renderChart(null); // Start with no focus

            // Handle Click on Lines
            myChart.on('click', (params) => {
                if (params.componentType === 'series') {
                    renderChart(params.seriesName);
                }
            });

            // Handle Click on Legend
            myChart.on('legendselectchanged', (params) => {
                renderChart(params.name);
            });

            window.addEventListener('resize', () => myChart.resize());
        } catch (e) {
            console.error("Fail:", e);
        }
    }

    function renderChart(focusBank) {
        const resetBtn = document.getElementById('resetBtn');
        resetBtn.style.display = focusBank ? 'block' : 'none';

        const option = {
            animation: false, // Set to false for instant state switching
            color: MASTER_COLORS,
            tooltip: {
                trigger: 'axis',
                order: 'seriesDesc',
                valueFormatter: (v) => v ? v.toFixed(2) + '%' : '—'
            },
            legend: {
                bottom: 0,
                selectedMode: false, // We handle selection manually
                data: bankNames.map((name, index) => ({
                    name: name,
                    itemStyle: {
                        // If focusing, gray out the legend icons too
                        color: !focusBank || name === focusBank ? MASTER_COLORS[index % MASTER_COLORS.length] : '#ccc'
                    }
                }))
            },
            grid: { top: 40, bottom: 80, left: 50, right: 50 },
            dataZoom: [{ type: 'slider', bottom: 40, height: 20 }],
            xAxis: { type: 'time' },
            yAxis: { type: 'value', min: 'dataMin', axisLabel: { formatter: '{value}%' } },
            series: bankNames.map((name, index) => {
                const isFocused = !focusBank || name === focusBank;
                const baseColor = MASTER_COLORS[index % MASTER_COLORS.length];

                return {
                    name: name,
                    type: 'line',
                    step: 'end',
                    symbol: 'none',
                    connectNulls: true,
                    z: isFocused ? 10 : 1, // Bring focused line to front
                    lineStyle: {
                        color: isFocused ? baseColor : '#e2e8f0',
                        width: isFocused ? 4 : 1,
                        opacity: isFocused ? 1 : 0.3
                    },
                    data: rawData.map(d => [d.date, d[name]])
                };
            })
        };

        // 'true' as the second argument forces a full redraw (notMerge)
        myChart.setOption(option, true);
    }

    function resetChart() {
        renderChart(null);
    }

    init();
</script>

</body>
</html>
