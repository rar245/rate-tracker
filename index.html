<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Tracker | Diagnostic Build</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --surface: #1e293b; --primary: #38bdf8; --text: #f8fafc; --border: #334155; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); }
        .app-container { display: flex; height: 100vh; width: 100vw; }
        
        /* Sidebar */
        aside { width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .bank-list { overflow-y: auto; flex: 1; padding: 15px; }
        .bank-item { padding: 8px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; font-size: 12px; margin-bottom: 4px; border: 1px solid transparent; }
        .bank-item.active { background: rgba(56, 189, 248, 0.1); border-color: var(--primary); font-weight: 600; color: var(--primary); }
        .color-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; opacity: 0.2; }
        .active .color-dot { opacity: 1; }

        /* Main area */
        main { flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        .top-section { padding: 20px; flex-shrink: 0; }
        .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 15px; }
        .kpi-card { background: var(--surface); padding: 12px; border-radius: 10px; border: 1px solid var(--border); }
        .chart-section { flex: 1; margin: 0 20px 20px 20px; background: var(--surface); border-radius: 12px; border: 1px solid var(--border); position: relative; min-height: 0; }
        #mainChart { height: 100%; width: 100%; }

        /* Diagnostic Box */
        #diagnostic { display: none; background: #450a0a; color: #fecaca; padding: 20px; font-family: 'JetBrains Mono', monospace; font-size: 12px; overflow-y: auto; max-height: 200px; border-bottom: 2px solid #7f1d1d; }
    </style>
</head>
<body>

<div id="diagnostic"><strong>DIAGNOSTIC LOG:</strong><br></div>

<div class="app-container">
    <aside>
        <div style="padding: 20px; border-bottom: 1px solid var(--border);">
            <h2 style="font-size: 10px; text-transform: uppercase; color: #94a3b8; margin:0;">Institutions</h2>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <button onclick="toggleAll(true)" style="flex:1; font-size:9px; padding:5px; cursor:pointer;">ALL</button>
                <button onclick="toggleAll(false)" style="flex:1; font-size:9px; padding:5px; cursor:pointer;">NONE</button>
            </div>
        </div>
        <div class="bank-list" id="bankList"></div>
    </aside>

    <main>
        <div class="top-section">
            <h1 style="margin:0; font-size: 20px;">Rate Intelligence <span style="opacity:0.5;">v2.0</span></h1>
            <div class="kpi-grid" id="kpiRow"></div>
        </div>
        <div class="chart-section">
            <div id="mainChart"></div>
        </div>
    </main>
</div>

<script>
    const COLORS = ['#38bdf8', '#10b981', '#fbbf24', '#f87171', '#818cf8', '#22d3ee', '#fb7185', '#c084fc', '#6366f1'];
    let myChart, masterData, selectedBanks = new Set();

    function diag(msg) {
        const d = document.getElementById('diagnostic');
        d.style.display = 'block';
        d.innerHTML += `> ${msg}<br>`;
        console.log(msg);
    }

    async function init() {
        diag("Starting App...");
        try {
            diag("Attempting to fetch ./data/rates.json");
            const res = await fetch('./data/rates.json');
            
            if (!res.ok) {
                throw new Error(`HTTP Error: ${res.status} - Check if 'npx serve' is running in the correct folder.`);
            }

            masterData = await res.json();
            diag(`Success: Loaded ${masterData.length} data rows.`);

            const banks = Object.keys(masterData[0]).filter(k => k !== 'date');
            diag(`Found ${banks.length} banks.`);
            
            // Set Market Leader
            const last = masterData[masterData.length - 1];
            let leader = banks[0];
            banks.forEach(b => { if(last[b] > last[leader]) leader = b; });
            selectedBanks.add(leader);

            const chartEl = document.getElementById('mainChart');
            if (!chartEl) throw new Error("DOM Error: #mainChart not found.");
            
            myChart = echarts.init(chartEl);
            diag("ECharts initialized.");

            myChart.on('click', (params) => {
                if (params.componentType === 'series') toggleBank(params.seriesName);
            });

            update();
            window.addEventListener('resize', () => myChart.resize());
            diag("App Ready.");

        } catch (e) {
            diag(`CRITICAL ERROR: ${e.message}`);
        }
    }

    function update() {
        const banks = Object.keys(masterData[0]).filter(k => k !== 'date');
        renderKPIs();
        renderSidebar(banks);
        renderChart(banks);
    }

    function renderKPIs() {
        const last = masterData[masterData.length - 1];
        const banks = Object.keys(last).filter(k => k !== 'date');
        let leader = { name: '', rate: 0 }, sum = 0, count = 0;
        banks.forEach(b => {
            const r = last[b];
            if (r > leader.rate) leader = { name: b, rate: r };
            if (r > 0) { sum += r; count++; }
        });
        document.getElementById('kpiRow').innerHTML = `
            <div class="kpi-card"><div style="font-size:9px; color:#94a3b8">LEADER</div><div style="font-family:JetBrains Mono; color:#10b981; font-size:20px; font-weight:700;">${leader.rate.toFixed(2)}%</div><div style="font-size:9px">${leader.name}</div></div>
            <div class="kpi-card"><div style="font-size:9px; color:#94a3b8">AVG APY</div><div style="font-family:JetBrains Mono; font-size:20px; font-weight:700;">${(sum/count).toFixed(2)}%</div><div style="font-size:9px">Current</div></div>
            <div class="kpi-card"><div style="font-size:9px; color:#94a3b8">SNAPSHOT</div><div style="font-family:JetBrains Mono; font-size:16px; font-weight:700; color:#38bdf8;">${last.date}</div><div style="font-size:9px">Verified</div></div>`;
    }

    function renderSidebar(banks) {
        document.getElementById('bankList').innerHTML = banks.map((b, i) => `
            <div class="bank-item ${selectedBanks.has(b) ? 'active' : ''}" onclick="toggleBank('${b}')">
                <div class="color-dot" style="background-color: ${COLORS[i % COLORS.length]}"></div>
                <span>${b}</span>
            </div>`).join('');
    }

    function toggleBank(name) {
        selectedBanks.has(name) ? selectedBanks.delete(name) : selectedBanks.add(name);
        update();
    }

    function toggleAll(show) {
        selectedBanks = show ? new Set(Object.keys(masterData[0]).filter(k => k !== 'date')) : new Set();
        update();
    }

    function renderChart(banks) {
        const option = {
            tooltip: {
                trigger: 'axis',
                backgroundColor: 'rgba(15, 23, 42, 0.9)',
                borderColor: '#334155',
                textStyle: { color: '#f8fafc', fontSize: 11 },
                formatter: (params) => {
                    let res = `<div style="border-bottom:1px solid #334155; padding-bottom:5px; margin-bottom:5px;"><b>${params[0].axisValueLabel}</b></div>`;
                    params.filter(p => p.value[1] !== null).forEach(p => {
                        const isSel = selectedBanks.has(p.seriesName);
                        res += `<div style="display:flex; justify-content:space-between; gap:20px; opacity: ${isSel ? 1 : 0.4}">
                                    <span>${p.marker} ${p.seriesName}</span>
                                    <b style="color:${isSel ? '#38bdf8' : '#94a3b8'}">${p.value[1].toFixed(2)}%</b>
                                </div>`;
                    });
                    return res;
                }
            },
            grid: { top: 20, left: 10, right: 10, bottom: 60, containLabel: true },
            dataZoom: [{ type: 'slider', bottom: 10, height: 30, borderColor: 'transparent', backgroundColor: '#0f172a', fillerColor: 'rgba(56, 189, 248, 0.1)', handleStyle: { color: '#38bdf8' }, textStyle: { color: '#94a3b8' }, start: 80, end: 100 }],
            xAxis: { type: 'time', axisLine: { lineStyle: { color: '#334155' } } },
            yAxis: { type: 'value', min: 'dataMin', axisLabel: { formatter: '{value}%', color: '#94a3b8' }, splitLine: { lineStyle: { color: '#334155', type: 'dashed' } } },
            series: banks.map((name, i) => {
                const sel = selectedBanks.has(name);
                return {
                    name, type: 'line', step: 'end', symbol: 'none', connectNulls: true, z: sel ? 10 : 1,
                    lineStyle: { color: sel ? COLORS[i % COLORS.length] : '#1e293b', width: sel ? 3 : 1, opacity: sel ? 1 : 0.05 },
                    data: masterData.map(d => [d.date, d[name]])
                };
            })
        };
        myChart.setOption(option, true);
    }

    // Explicitly call init
    init();
</script>
</body>
</html>
