<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Tracker Pro | Unified View</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #38bdf8;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Legend */
        aside {
            width: 260px;
            min-width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .bank-list {
            overflow-y: auto;
            flex-grow: 1;
        }

        .bank-item {
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            font-size: 13px;
            color: var(--text-muted);
        }

        .bank-item:hover { background: #334155; color: var(--text); }
        .bank-item.active { 
            background: rgba(56, 189, 248, 0.1); 
            border-color: var(--primary);
            color: var(--primary);
            font-weight: 600;
        }

        .color-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; }

        /* Main View */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 24px;
            position: relative;
        }

        .chart-container {
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 20px;
            flex-grow: 1;
        }

        #mainChart { width: 100%; height: 100%; min-height: 400px; }

        #statusOverlay {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 12px;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

<aside>
    <div style="padding-bottom: 15px; border-bottom: 1px solid var(--border); margin-bottom: 15px;">
        <h2 style="font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Institutions</h2>
    </div>
    <div class="bank-list" id="bankList"></div>
</aside>

<main>
    <div id="statusOverlay"></div>
    <div style="margin-bottom: 20px;">
        <h1 style="font-size: 22px; margin: 0;">Market Rate Intelligence</h1>
    </div>

    <div class="chart-container">
        <div id="mainChart"></div>
    </div>
</main>

<script>
    let myChart = null;
    let masterData = null;
    const COLORS = ['#38bdf8', '#10b981', '#fbbf24', '#f87171', '#818cf8', '#22d3ee', '#fb7185', '#c084fc', '#6366f1'];

    async function start() {
        const status = document.getElementById('statusOverlay');
        
        try {
            // Attempt to fetch from the data folder
            const res = await fetch('./data/rates.json');
            if (!res.ok) throw new Error("Rates file not found. Ensure npx serve is running.");
            
            masterData = await res.json();
            const banks = Object.keys(masterData[0]).filter(k => k !== 'date');

            // Initialize Sidebar
            const list = document.getElementById('bankList');
            list.innerHTML = banks.map((b, i) => `
                <div class="bank-item" id="item-${b}" onclick="focusBank('${b}')">
                    <div class="color-dot" style="background-color: ${COLORS[i % COLORS.length]}"></div>
                    <span>${b.replace(/_/g, ' ')}</span>
                </div>
            `).join('');

            // Initialize Chart
            myChart = echarts.init(document.getElementById('mainChart'));
            renderChart(null);
            
            window.addEventListener('resize', () => myChart.resize());

        } catch (e) {
            status.style.display = 'block';
            status.style.background = '#fef2f2';
            status.style.color = '#991b1b';
            status.innerHTML = `<strong>Error:</strong> ${e.message}`;
        }
    }

    function focusBank(name) {
        document.querySelectorAll('.bank-item').forEach(el => el.classList.remove('active'));
        if (name) document.getElementById(`item-${name}`).classList.add('active');
        renderChart(name);
    }

    function renderChart(focusName) {
        const banks = Object.keys(masterData[0]).filter(k => k !== 'date');
        const option = {
            backgroundColor: 'transparent',
            tooltip: {
                trigger: 'axis',
                backgroundColor: '#1e293b',
                borderColor: '#334155',
                textStyle: { color: '#f8fafc' },
                order: 'seriesDesc'
            },
            grid: { top: 30, left: 10, right: 10, bottom: 60, containLabel: true },
            dataZoom: [{ 
                type: 'slider', 
                bottom: 0, 
                height: 30, 
                borderColor: 'transparent',
                backgroundColor: '#0f172a',
                handleStyle: { color: '#38bdf8' },
                textStyle: { color: '#94a3b8' }
            }],
            xAxis: { type: 'time', axisLine: { lineStyle: { color: '#334155' } } },
            yAxis: { type: 'value', min: 'dataMin', splitLine: { lineStyle: { color: '#334155', type: 'dashed' } } },
            series: banks.map((name, i) => {
                const isFocused = !focusName || name === focusName;
                return {
                    name: name,
                    type: 'line',
                    step: 'end',
                    symbol: 'none',
                    connectNulls: true,
                    z: isFocused ? 10 : 1,
                    lineStyle: {
                        color: isFocused ? COLORS[i % COLORS.length] : '#1e293b',
                        width: isFocused ? 3 : 1,
                        opacity: isFocused ? 1 : 0.15
                    },
                    data: masterData.map(d => [d.date, d[name]])
                };
            })
        };
        myChart.setOption(option, true);
    }

    // Run the application
    start();
</script>
</body>
</html>
